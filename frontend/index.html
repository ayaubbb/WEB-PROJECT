<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="styles/variables.css">
    <link rel="stylesheet" href="styles/layout.css">
    <link rel="stylesheet" href="styles/sidebar.css">
    <link rel="stylesheet" href="styles/header.css">
    <link rel="stylesheet" href="pages/canteen/canteen.css">
    <link rel="stylesheet" href="pages/equipment/equipment.css">
    <link rel="stylesheet" href="pages/dashboard/dashboard.css">
    <link rel="stylesheet" href="pages/my_reports/my_reports.css">
    <script src="auth-guard.js"></script>
    <title>SmartDorm</title>
</head>
<body>
    <div class="main-container">
        <aside class="sidebar">
            
            <div class="logo-wrapper">
                <div class="custom-logo">
                    <span class="logo-sd"><img src="assets/icons/sd.png" alt="SD" class="sd-img"></span>
                    <span class="star-mini">✦</span>
                    <span class="logo-smart">Smart</span><span class="logo-dorm">Dorm</span>
                    <span class="star-big">★</span>
                </div>
            </div>
            
            <nav class="menu">
                <a href="#" class="menu-item active" data-page="dashboard">
                    <i class="fa-solid fa-house"></i> Dashboard
                </a>
                <a href="#" class="menu-item" data-page="rooms">
                    <i class="fa-solid fa-bed"></i> Rooms & Booking
                </a>
                <a href="#" class="menu-item" data-page="canteen">
                    <i class="fa-solid fa-utensils"></i> Canteen
                </a>
                <a href="#" class="menu-item" data-page="equipment">
                    <i class="fa-solid fa-screwdriver-wrench"></i> Equipment
                </a>
                <a href="#" class="menu-item" data-page="my_reports">
                    <i class="fa-solid fa-file-lines"></i> My Reports
                </a>
                <a href="#" class="menu-item" data-page="support">
                    <i class="fa-solid fa-circle-question"></i> Support
                </a>
            </nav>
            <div class="user-bottom">
                <div id="user-avatar" class="avatar" style="background:#26a69a;color:white;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;border-radius:50%;width:36px;height:36px;flex-shrink:0;">AD</div>
                <span id="username-display">Loading...</span>
                <i class="fa-solid fa-arrow-right-from-bracket logout-icon" id="logout-btn" style="cursor: pointer; margin-left: auto;"></i>
            </div>
        </aside>

        <main class="content-area">
            <header class="top-header">
                <h1 id="page-title">Dashboard</h1>

                <div class="user-profile-header">
                    <div class="user-info-text">
                        <span class="user-name-text" id="header-username-display">Loading...</span>
                        <span class="user-status-text">Student</span>
                    </div>
                    <div id="header-user-avatar" class="header-avatar" style="background:#26a69a;color:white;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;border-radius:50%;width:36px;height:36px;flex-shrink:0;">AD</div>
                </div>
            </header>
            
            <section id="page-content">
            </section>
        </main>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const username = localStorage.getItem('username') || 'Guest';
            let initials;
            if (username.includes(' ')) {
                initials = username.split(' ')
                    .map(w => w[0]).join('').toUpperCase().slice(0, 2);
            } else {
                initials = username.slice(0, 2).toUpperCase();
            }
            const sidebarAv = document.getElementById('user-avatar');
            const headerAv = document.getElementById('header-user-avatar');
            if (sidebarAv) sidebarAv.textContent = initials;
            if (headerAv) headerAv.textContent = initials;
        });
    </script>
    <script type="module" src="script.js"></script>
</body>
</html>
