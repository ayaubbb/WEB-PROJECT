<link rel="stylesheet" href="pages/dashboard/dashboard.css">

<div class="dashboard-container">
    <div class="dashboard-header">
        <h2 class="section-title">Overall Performance</h2>
    </div>

    <div class="stats-grid">
        <div class="stat-card" id="db-card-rooms" data-type="rooms">
            <div class="card-info">
                <span class="card-label">Active Room Bookings</span>
                <span class="card-value" id="stat-rooms">0</span>
                <span class="card-sub">Updated just now</span>
            </div>
            <i class="fa-solid fa-calendar-check card-icon"></i>
        </div>

        <div class="stat-card" id="db-card-canteen" data-type="canteen">
            <div class="card-info">
                <span class="card-label">Canteen Availability</span>
                <span class="card-value" id="stat-canteen">0%</span>
                <div class="db-progress-bg">
                    <div id="bar-canteen" class="db-progress-fill" style="width: 0%"></div>
                </div>
            </div>
            <i class="fa-solid fa-utensils card-icon"></i>
        </div>

        <div class="stat-card" id="db-card-reports" data-type="reports">
            <div class="card-info">
                <span class="card-label">Open Equipment Reports</span>
                <span class="card-value" id="stat-reports">0</span>
                <span class="card-sub">Requires attention</span>
            </div>
            <i class="fa-solid fa-bell card-icon"></i>
        </div>
    </div>

    <div class="dashboard-details">
        <div class="details-view chart-box">
            <div class="view-header">
                <h3 id="details-title">Performance Analytics</h3>
            </div>
            <div class="view-content" id="info-content-area">
                <div class="loading-msg">Select a category...</div>
            </div>
        </div>

        <div class="details-view actions-box">
            <div class="view-header">
                <h3>Latest Actions</h3>
            </div>
            <div class="view-content">
                <div id="actions-log" class="actions-list">
                    <div class="loading-msg">Loading actions...</div>
                </div>
            </div>
        </div>
    </div>
</div>
